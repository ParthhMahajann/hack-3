version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ASHA Saheli — Production-grade Docker Compose
# Replaces SQLite with PostgreSQL for concurrent multi-ASHA deployments.
#
# Usage:
#   docker compose up --build          # start all services
#   docker compose up -d               # detached mode
#   docker compose down -v             # tear down including volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: asha
      POSTGRES_PASSWORD: asha_secret_change_in_prod
      POSTGRES_DB: asha_saheli
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"            # expose for local inspection; remove in prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asha -d asha_saheli"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Switch DATABASE_URL to PostgreSQL — asyncpg driver
      DATABASE_URL: postgresql+asyncpg://asha:asha_secret_change_in_prod@db:5432/asha_saheli
      SECRET_KEY: ${SECRET_KEY:-asha-saheli-demo-secret-change-in-prod}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      # Mount source for development hot-reload (remove in prod)
      - .:/app
    command: >
      uvicorn backend.main:app
        --host 0.0.0.0
        --port 8000
        --reload

volumes:
  postgres_data:
    driver: local
